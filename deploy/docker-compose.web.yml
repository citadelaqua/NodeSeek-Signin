services:
  nodeseek-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      - WEB_PASSWORD=${WEB_PASSWORD:-admin}
      - JWT_SECRET=${JWT_SECRET:-}
      - IN_DOCKER=true
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data      # SQLite database
      - ../cookie:/app/cookie  # Cookie persistence
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/scheduler/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
